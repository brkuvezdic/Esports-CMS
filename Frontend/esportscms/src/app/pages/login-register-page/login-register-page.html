<div class="auth-wrap">
  <div class="auth-card">
    <h3>{{ isLoginMode ? 'Login' : 'Create Account' }}</h3>

    @if (isLoginMode) {
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-row">
          <label class="form-label">Username</label>
          <input formControlName="username" type="text" class="form-control" placeholder="Enter your username">
        </div>

        <div class="form-row">
          <label class="form-label">Password</label>
          <input formControlName="password" type="password" class="form-control" placeholder="Enter your password">
        </div>

        <div class="auth-actions">
          <button class="btn" type="submit">Login</button>
        </div>
      </form>
    }

    @if (!isLoginMode) {
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="form-row">
          <label class="form-label">Username</label>
          <input formControlName="username" type="text" class="form-control" placeholder="Choose a username">
        </div>

        <div class="form-row">
          <label class="form-label">Password</label>
          <input formControlName="password" type="password" class="form-control" placeholder="Create a password">
        </div>

        <div class="auth-actions">
          <button class="btn btn--ghost" type="submit">Sign Up</button>
        </div>
      </form>
    }

    @if (message) {
      <div class="mt-3" role="status">{{ message }}</div>
    }

    <div style="margin-top:var(--space-md)">
      <button (click)="toggleMode()" class="toggle-btn w-100">{{ isLoginMode ? "Don't have an account? Sign up" : "Already have an account? Login" }}</button>
    </div>
  </div>
</div>
