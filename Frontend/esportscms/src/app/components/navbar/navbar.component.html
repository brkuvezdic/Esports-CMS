<header class="navbar">
  <a class="brand" routerLink="/">ESports CMS</a>

  <nav aria-label="Primary navigation">
    <ul class="nav-links">
      <li><a routerLink="/About" routerLinkActive="router-link-active">About</a></li>
      <li><a class="live-indicator" routerLink="/UpcomingMatches" routerLinkActive="router-link-active">Upcoming Matches</a></li>
      @if (!auth.getToken()) {
      <li><a routerLink="/Login" routerLinkActive="active">Login</a></li>
      }
      @if (auth.getToken()) {
      <li><a (click)="auth.logout()" routerLink="/" routerLinkActive="router-link-active">Logout</a></li>
      }
      @if (auth.isAdmin() || auth.isStudent()) {
      <li><a routerLink="/Cms" routerLinkActive="active">CMS</a></li>
      }
    </ul>
  </nav>
</header>
